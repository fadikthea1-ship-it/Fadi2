<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة الاختبارات التفاعلية | Interactive Exam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0c0e12;
            --ink-soft: #3a3f4a;
            --paper: #ffffff;
            --mist: #eef5ff;
            --sky: #5ea9ff;
            --sky-deep: #2d7df6;
            --sky-glow: rgba(94, 169, 255, 0.45);
            --line: #e3e9f2;
            --muted: #8a93a3;
            --good: #19b37b;
            --good-bg: #e7f9f0;
            --good-line: #19b37b;
            --bad: #ef4d57;
            --bad-bg: #fdecee;
            --bad-line: #ef4d57;
            --radius-lg: 22px;
            --radius-md: 14px;
            --shadow-card: 0 24px 60px -20px rgba(12, 14, 18, 0.18), 0 2px 8px rgba(12, 14, 18, 0.04);
        }

        * { box-sizing: border-box; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

        html, body { margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', 'Manrope', 'Segoe UI', Tahoma, sans-serif;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px 60px;
            position: relative;
            overflow-x: hidden;
            background: var(--paper);
        }

        html[dir="ltr"] body { font-family: 'Manrope', 'Tajawal', 'Segoe UI', Tahoma, sans-serif; }

        .bg-field {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 900px 500px at 50% -10%, var(--sky-glow), transparent 60%),
                radial-gradient(ellipse 700px 500px at 90% 10%, rgba(45, 125, 246, 0.12), transparent 55%),
                linear-gradient(180deg, #fbfdff 0%, #ffffff 40%, #f4f8ff 100%);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.5;
            background-image:
                linear-gradient(to left, rgba(12,14,18,0.035) 1px, transparent 1px),
                linear-gradient(to top, rgba(12,14,18,0.035) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(to bottom, transparent, rgba(0,0,0,0.7) 12%, rgba(0,0,0,0.7) 70%, transparent);
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            animation: dropIn 0.5s ease both;
        }
        .brand-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--sky), var(--sky-deep));
            box-shadow: 0 0 0 4px rgba(94,169,255,0.18);
        }
        .brand-text {
            font-weight: 800;
            letter-spacing: 0.02em;
            font-size: 13px;
            color: var(--ink-soft);
            text-transform: uppercase;
        }
        .sound-toggle-btn {
            margin-inline-start: 4px;
            border: 1.5px solid var(--line);
            background: var(--paper);
            border-radius: 999px;
            width: 32px;
            height: 32px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
        }
        .sound-toggle-btn:hover {
            border-color: var(--sky);
            transform: translateY(-1px);
        }
        .sound-toggle-btn.muted {
            opacity: 0.55;
        }

        .controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            width: 100%;
            max-width: 760px;
            animation: dropIn 0.6s ease both;
            animation-delay: 0.05s;
        }

        .lang-switcher {
            display: flex;
            gap: 6px;
            background: var(--ink);
            padding: 5px;
            border-radius: 999px;
            box-shadow: 0 10px 24px -10px rgba(12,14,18,0.35);
        }

        .lang-btn {
            background: transparent;
            color: rgba(255,255,255,0.65);
            border: none;
            padding: 9px 22px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--sky), var(--sky-deep));
            color: #ffffff;
            box-shadow: 0 4px 14px -2px rgba(45,125,246,0.5);
        }

        .lang-btn:hover:not(.active) {
            color: #ffffff;
        }

        .unit-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background-color: var(--paper);
            color: var(--ink-soft);
            border: 1.5px solid var(--line);
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .tab-btn:hover {
            border-color: var(--sky);
            color: var(--sky-deep);
            transform: translateY(-1px);
        }

        .tab-btn.active {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
        }

        .quiz-container {
            background-color: var(--paper);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--line);
            width: 100%;
            max-width: 760px;
            padding: 38px 34px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.6s cubic-bezier(.2,.8,.2,1) both;
            animation-delay: 0.1s;
        }

        .quiz-container::before {
            content: "";
            position: absolute;
            top: 0; right: 0; left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--sky) 0%, var(--sky-deep) 50%, var(--ink) 100%);
        }

        h1 {
            text-align: center;
            color: var(--ink);
            margin-top: 4px;
            margin-bottom: 6px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        .unit-title-header {
            text-align: center;
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 24px;
            font-weight: 700;
        }

        .progress-bar-container {
            width: 100%;
            background-color: var(--mist);
            height: 10px;
            border-radius: 999px;
            margin-bottom: 28px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--sky), var(--sky-deep));
            width: 0%;
            transition: width 0.4s cubic-bezier(.2,.8,.2,1);
            box-shadow: 0 0 12px var(--sky-glow);
            position: relative;
        }

        .progress-bar::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
            animation: shimmer 1.8s linear infinite;
        }

        .question-block {
            margin-bottom: 8px;
            animation: questionIn 0.4s cubic-bezier(.2,.8,.2,1) both;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .question-counter {
            font-size: 13px;
            font-weight: 800;
            color: var(--sky-deep);
            background: var(--mist);
            padding: 5px 14px;
            border-radius: 999px;
            letter-spacing: 0.02em;
        }

        .question-text {
            font-size: 21px;
            font-weight: 700;
            margin-bottom: 22px;
            line-height: 1.55;
            color: var(--ink);
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            width: 100%;
        }

        .option-btn {
            width: 100%;
            text-align: right;
            padding: 16px 20px;
            background-color: var(--paper);
            border: 2px solid var(--line);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.18s ease;
            font-size: 16px;
            font-weight: 500;
            font-family: inherit;
            color: var(--ink);
            display: block;
            box-sizing: border-box;
            position: relative;
        }

        html[dir="ltr"] .option-btn {
            text-align: left;
        }

        .option-btn strong {
            color: var(--sky-deep);
            font-weight: 800;
            margin-inline-end: 4px;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--mist);
            border-color: var(--sky);
            transform: translateY(-2px);
            box-shadow: 0 8px 18px -8px rgba(45,125,246,0.35);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn:focus-visible {
            outline: 3px solid var(--sky-deep);
            outline-offset: 2px;
        }

        .option-btn.correct {
            background-color: var(--good-bg) !important;
            border-color: var(--good-line) !important;
            color: #0d6b4a !important;
            font-weight: 700;
            animation: pulseGood 0.5s ease;
        }
        .option-btn.correct strong { color: #0d6b4a !important; }

        .option-btn.wrong {
            background-color: var(--bad-bg) !important;
            border-color: var(--bad-line) !important;
            color: #b3222c !important;
            animation: shakeX 0.4s ease;
        }
        .option-btn.wrong strong { color: #b3222c !important; }

        #result-card {
            text-align: center;
            padding: 10px 0 0;
            display: none;
            animation: cardIn 0.5s cubic-bezier(.2,.8,.2,1) both;
        }

        .result-emoji {
            font-size: 52px;
            display: block;
            margin-bottom: 6px;
            animation: popIn 0.5s cubic-bezier(.2,.8,.2,1) both;
        }

        .result-msg {
            font-size: 25px;
            font-weight: 800;
            margin-bottom: 18px;
            color: var(--ink);
        }

        .score-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--ink-soft);
            margin-bottom: 28px;
            line-height: 1.7;
        }

        .restart-btn {
            background: linear-gradient(135deg, var(--ink) 0%, #1d212b 100%);
            color: white;
            border: none;
            padding: 14px 34px;
            font-size: 16px;
            font-weight: 800;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.22s ease;
            font-family: inherit;
            box-shadow: 0 10px 24px -10px rgba(12,14,18,0.45);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px -10px rgba(12,14,18,0.5);
            background: linear-gradient(135deg, var(--sky-deep) 0%, var(--ink) 100%);
        }

        .restart-btn:active { transform: translateY(0); }

        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes questionIn {
            from { opacity: 0; transform: translateX(8px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes shimmer {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }
        @keyframes pulseGood {
            0% { transform: scale(1); }
            40% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        @keyframes shakeX {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.6); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 520px) {
            .quiz-container { padding: 26px 20px; }
            h1 { font-size: 21px; }
            .question-text { font-size: 18px; }
            .option-btn { padding: 14px 16px; font-size: 15px; }
            .tab-btn { font-size: 12px; padding: 8px 12px; }
        }

        /* ===== زر إدارة الوحدات (ثابت في الزاوية) ===== */
        .manage-corner-btn {
            position: fixed;
            top: 16px;
            inset-inline-end: 16px;
            z-index: 500;
            background: var(--paper);
            color: var(--ink-soft);
            border: 1.5px solid var(--line);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px -8px rgba(12,14,18,0.18);
        }
        .manage-corner-btn:hover {
            border-color: var(--sky);
            color: var(--sky-deep);
            transform: translateY(-1px) rotate(25deg);
            box-shadow: 0 10px 22px -8px rgba(45,125,246,0.35);
        }

        /* ===== نافذة الإدارة (Modal) ===== */
        .manage-overlay {
            position: fixed;
            inset: 0;
            background: rgba(12, 14, 18, 0.55);
            backdrop-filter: blur(3px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
            animation: fadeInOverlay 0.2s ease both;
        }
        .manage-overlay.open { display: flex; }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .manage-panel {
            background: var(--paper);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 560px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 26px 26px 30px;
            box-shadow: 0 30px 70px -20px rgba(0,0,0,0.4);
            animation: cardIn 0.3s cubic-bezier(.2,.8,.2,1) both;
            position: relative;
        }

        .manage-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .manage-header h2 {
            font-size: 19px;
            font-weight: 800;
            margin: 0;
            color: var(--ink);
        }
        .manage-close {
            background: var(--mist);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            color: var(--ink-soft);
            transition: all 0.2s ease;
        }
        .manage-close:hover {
            background: var(--bad-bg);
            color: var(--bad);
        }

        .manage-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            border-bottom: 1.5px solid var(--line);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }
        .manage-tab-btn {
            background: var(--mist);
            border: none;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12.5px;
            font-weight: 700;
            color: var(--ink-soft);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .manage-tab-btn.active {
            background: var(--ink);
            color: white;
        }

        .manage-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--ink-soft);
            margin-bottom: 6px;
            margin-top: 14px;
        }
        .manage-label:first-of-type { margin-top: 0; }

        .manage-input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--line);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            color: var(--ink);
            background: var(--paper);
            transition: border-color 0.2s ease;
        }
        .manage-input:focus {
            outline: none;
            border-color: var(--sky);
            box-shadow: 0 0 0 3px rgba(94,169,255,0.18);
        }
        .manage-textarea {
            resize: vertical;
            min-height: 56px;
        }

        .manage-options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .manage-action-btn {
            margin-top: 20px;
            width: 100%;
            background: linear-gradient(135deg, var(--sky), var(--sky-deep));
            color: white;
            border: none;
            padding: 13px;
            font-size: 14.5px;
            font-weight: 800;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .manage-action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px -8px rgba(45,125,246,0.5);
        }

        .manage-feedback {
            margin-top: 12px;
            font-size: 13px;
            font-weight: 700;
            min-height: 18px;
        }
        .manage-feedback.success { color: var(--good); }
        .manage-feedback.error { color: var(--bad); }

        .manage-hint {
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            padding: 20px 0;
        }

        .custom-unit-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border: 1.5px solid var(--line);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
        }
        .custom-unit-card .unit-info {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink);
        }
        .custom-unit-card .unit-count {
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
        }
        .custom-unit-card .unit-delete-btn {
            background: var(--bad-bg);
            color: var(--bad);
            border: none;
            padding: 7px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .custom-unit-card .unit-delete-btn:hover {
            background: var(--bad);
            color: white;
        }

        .custom-question-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px 8px 28px;
            font-size: 12.5px;
            color: var(--ink-soft);
            border-bottom: 1px solid var(--line);
        }
        .custom-question-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .question-delete-btn {
            background: none;
            border: none;
            color: var(--bad);
            font-size: 13px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 6px;
            margin-inline-start: 8px;
            flex-shrink: 0;
        }
        .question-delete-btn:hover {
            background: var(--bad-bg);
        }

        /* ===== نافذة كلمة المرور ===== */
        .password-panel {
            background: var(--paper);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 340px;
            padding: 32px 28px;
            text-align: center;
            box-shadow: 0 30px 70px -20px rgba(0,0,0,0.4);
            animation: cardIn 0.3s cubic-bezier(.2,.8,.2,1) both;
        }
        .password-icon {
            font-size: 34px;
            margin-bottom: 10px;
        }
        .password-title {
            font-size: 18px;
            font-weight: 800;
            margin: 0 0 6px;
            color: var(--ink);
        }
        .password-sub {
            font-size: 13px;
            color: var(--muted);
            margin: 0 0 18px;
            line-height: 1.6;
        }
        .password-panel .manage-input {
            text-align: center;
            margin-bottom: 14px;
            letter-spacing: 3px;
        }
        .password-panel .manage-action-btn {
            margin-top: 0;
        }
        .password-panel .manage-feedback {
            text-align: center;
        }

        /* ===== منطقة الحذف الخطرة ===== */
        .manage-section-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--ink-soft);
            margin: 0 0 10px;
        }
        .custom-unit-card.builtin-hidden {
            opacity: 0.5;
        }
        .custom-unit-card .unit-toggle-btn {
            background: var(--mist);
            color: var(--sky-deep);
            border: none;
            padding: 7px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-inline-end: 6px;
        }
        .custom-unit-card .unit-toggle-btn:hover {
            background: var(--sky);
            color: white;
        }
        .manage-danger-zone {
            margin-top: 26px;
            padding-top: 18px;
            border-top: 1.5px dashed var(--line);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .manage-danger-btn {
            background: var(--paper);
            border: 1.5px solid var(--line);
            color: var(--ink-soft);
            padding: 11px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .manage-danger-btn:hover {
            border-color: var(--sky);
            color: var(--sky-deep);
        }
        .manage-danger-btn.danger {
            border-color: var(--bad-line);
            color: var(--bad);
        }
        .manage-danger-btn.danger:hover {
            background: var(--bad);
            color: white;
        }
    </style>
</head>
<body>

<div class="bg-field"></div>
<div class="bg-grid"></div>

<button class="manage-corner-btn" id="manageBtn" onclick="openManagePanel()" title="إدارة الوحدات والأسئلة" aria-label="إدارة الوحدات والأسئلة">⚙️</button>

<div class="brand-row">
    <span class="brand-dot"></span>
    <span class="brand-text" id="brandText">Quiz</span>
    <button class="sound-toggle-btn" id="soundToggleBtn" onclick="toggleSound(this)" title="تشغيل/كتم الصوت" aria-label="تشغيل أو كتم الصوت">🔊</button>
</div>

<div class="controls-container">

    function getAudioCtx() {
        if (!audioCtx) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq, startTime, duration, ctx, type, peakGain, options) {
        options = options || {};
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, startTime);
        if (options.detuneCents) osc.detune.setValueAtTime(options.detuneCents, startTime);

        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(options.filterFreq || freq * 6, startTime);
        filter.Q.value = 0.7;

        const attack = options.attack !== undefined ? options.attack : 0.012;
        const release = Math.max(duration - attack, 0.04);
        const peak = peakGain || 0.16;

        gainNode.gain.setValueAtTime(0.0001, startTime);
        gainNode.gain.exponentialRampToValueAtTime(peak, startTime + attack);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + attack + release);

        osc.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(ctx.destination);

        osc.start(startTime);
        osc.stop(startTime + duration + 0.02);

        // هارمونية خفيفة (أوكتاف أعلى بحجم صوت أقل) لإضافة عمق ودفء للنغمة
        if (options.withHarmonic) {
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.type = type || 'sine';
            osc2.frequency.setValueAtTime(freq * 2, startTime);
            gain2.gain.setValueAtTime(0.0001, startTime);
            gain2.gain.exponentialRampToValueAtTime(peak * 0.22, startTime + attack);
            gain2.gain.exponentialRampToValueAtTime(0.0001, startTime + attack + release);
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.start(startTime);
            osc2.stop(startTime + duration + 0.02);
        }
    }

    function playEchoTail(freq, startTime, duration, ctx, type, peakGain) {
        playTone(freq, startTime + duration * 0.5, duration * 0.7, ctx, type, peakGain * 0.3);

    let filteredQuestions = [];

    let userScore = 0;

    // ===== نظام الوحدات والأسئلة المخصّصة (يُحفظ في localStorage) =====
    const CUSTOM_STORAGE_KEY = 'quizCustomUnits_v1';
    const MANAGE_PASSWORD = 'fadi';
    let isManageUnlocked = false;

    function loadCustomUnits() {
        try {
            const raw = localStorage.getItem(CUSTOM_STORAGE_KEY);
            const parsed = raw ? JSON.parse(raw) : null;
            return {
                units: (parsed && parsed.units) || [],
                questions: (parsed && parsed.questions) || [],
                hiddenBuiltinUnits: (parsed && parsed.hiddenBuiltinUnits) || []
            };
        } catch (e) {
            return { units: [], questions: [], hiddenBuiltinUnits: [] };
        }
    }

    function saveCustomUnits(data) {
        try {
            localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(data));
        } catch (e) { /* تجاهل أخطاء التخزين */ }
    }

    let customData = loadCustomUnits();

    // قائمة الوحدات الأساسية الثابتة (لإدارة الإخفاء/الاسترجاع)
    const BUILTIN_UNITS = [
        { id: 'invitations', nameAr: 'الدعوات', nameEn: 'Invitations', tabId: 'tab-inv' },
        { id: 'unit2', nameAr: 'الوحدة 2', nameEn: 'Unit 2', tabId: 'tab-u2' },
        { id: 'unit3', nameAr: 'الوحدة 3', nameEn: 'Unit 3', tabId: 'tab-u3' },
        { id: 'unit4', nameAr: 'الوحدة 4', nameEn: 'Unit 4', tabId: 'tab-u4' },
        { id: 'learning_tips', nameAr: 'نصائح التعلم', nameEn: 'Learning Tips', tabId: 'tab-lt' },
        { id: 'did_you_know', nameAr: 'هل تعلم؟', nameEn: 'Did You Know', tabId: 'tab-dyk' },
        { id: 'vocabulary', nameAr: 'مفردات عامة', nameEn: 'Vocabulary', tabId: 'tab-vocab' },
        { id: 'smash_grab', nameAr: 'Smash and Grab', nameEn: 'Smash and Grab', tabId: 'tab-sg' },
        { id: 'crazy', nameAr: 'Crazy', nameEn: 'Crazy', tabId: 'tab-crazy' }
    ];

    function isBuiltinHidden(unitId) {
        return customData.hiddenBuiltinUnits.includes(unitId);
    }

    // إعادة بناء quizData بالكامل من المصدر الأصلي + تطبيق الإخفاء + دمج المخصص
    function rebuildQuizData() {
        ['ar', 'en'].forEach(lang => {
            const baseQuestions = ORIGINAL_BUILTIN_QUESTIONS[lang].filter(q => !isBuiltinHidden(q.cat));
            quizData[lang].questions = JSON.parse(JSON.stringify(baseQuestions));
        });

        customData.questions.forEach(q => {
            ['ar', 'en'].forEach(lang => {
                const textKey = lang === 'ar' ? 'qAr' : 'qEn';
                quizData[lang].questions.push({
                    cat: q.unitId,
                    q: q[textKey] && q[textKey].trim() ? q[textKey] : q.qAr,
                    options: q.options,
                    correct: q.correct,
                    isCustom: true
                });
            });
        });

        customData.units.forEach(u => {
            quizData.ar.headers[u.id] = `قسم: ${u.nameAr}`;
            quizData.en.headers[u.id] = `Section: ${u.nameEn || u.nameAr}`;
        });
    }

    function applyBuiltinTabsVisibility() {
        BUILTIN_UNITS.forEach(u => {
            const tabBtn = document.getElementById(u.tabId);
            if (tabBtn) {
                tabBtn.style.display = isBuiltinHidden(u.id) ? 'none' : '';
            }
        });
    }

    // دمج الوحدات المخصصة كتبويبات إضافية + دمج أسئلتها داخل quizData لكل اللغتين
    // (تم استبدالها بـ rebuildQuizData أعلاه — تبقى الدالة هنا فقط كاسم بديل للتوافق)
    function mergeCustomDataIntoQuiz() {
        rebuildQuizData();
        applyBuiltinTabsVisibility();
    }


    function renderCustomTabs() {
        const container = document.getElementById('unitTabsContainer');
        container.querySelectorAll('.tab-btn.custom-tab').forEach(el => el.remove());

        customData.units.forEach(u => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn custom-tab';
            btn.id = `tab-custom-${u.id}`;
            btn.onclick = () => filterUnit(u.id);
            btn.innerText = currentLang === 'ar' ? u.nameAr : (u.nameEn || u.nameAr);
            container.appendChild(btn);
        });

        if (customData.units.some(u => u.id === currentFilter)) {
            const activeBtn = document.getElementById(`tab-custom-${currentFilter}`);
            if (activeBtn) {
                container.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                activeBtn.classList.add('active');
            }
        }
    }

    function refreshQuestionUnitSelect() {
        const select = document.getElementById('questionUnitSelect');
        if (!select) return;
        select.innerHTML = '';
        if (customData.units.length === 0) {
            const opt = document.createElement('option');
            opt.value = '';
            opt.innerText = 'لا توجد وحدات — أضف وحدة أولاً';
            select.appendChild(opt);
            return;
        }
        customData.units.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.id;
            opt.innerText = `${u.nameAr} (${u.id})`;
            select.appendChild(opt);
        });
    }

    function renderBuiltinUnitsList() {
        const list = document.getElementById('builtinUnitsList');
        list.innerHTML = '';

        BUILTIN_UNITS.forEach(u => {
            const hidden = isBuiltinHidden(u.id);
            const qCount = ORIGINAL_BUILTIN_QUESTIONS.ar.filter(q => q.cat === u.id).length;
            const card = document.createElement('div');
            card.className = 'custom-unit-card' + (hidden ? ' builtin-hidden' : '');
            card.innerHTML = `
                <div>
                    <div class="unit-info">${u.nameAr} <span style="color:var(--muted); font-weight:500;">(${u.id})</span></div>
                    <div class="unit-count">${qCount} سؤال${hidden ? ' — مخفية حالياً' : ''}</div>
                </div>
            `;
            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'unit-toggle-btn';
            toggleBtn.innerText = hidden ? '↺ استرجاع' : '🚫 إخفاء';
            toggleBtn.onclick = () => toggleBuiltinUnit(u.id);
            card.appendChild(toggleBtn);
            list.appendChild(card);
        });
    }

    function toggleBuiltinUnit(unitId) {
        if (isBuiltinHidden(unitId)) {
            customData.hiddenBuiltinUnits = customData.hiddenBuiltinUnits.filter(id => id !== unitId);
        } else {
            if (!confirm('سيتم إخفاء هذه الوحدة الأساسية من الاختبار. يمكنك استرجاعها في أي وقت من هذه القائمة. هل تريد الاستمرار؟')) return;
            customData.hiddenBuiltinUnits.push(unitId);
        }
        saveCustomUnits(customData);
        rebuildQuizData();
        applyBuiltinTabsVisibility();
        renderBuiltinUnitsList();
        if (currentFilter === unitId && isBuiltinHidden(unitId)) {
            filterUnit('all');
        } else {
            initQuiz();
        }
    }

    function renderCustomUnitsList() {
        const list = document.getElementById('customUnitsList');
        const emptyMsg = document.getElementById('noCustomUnitsMsg');
        list.innerHTML = '';

        if (customData.units.length === 0) {
            emptyMsg.style.display = 'block';
            return;
        }
        emptyMsg.style.display = 'none';

        customData.units.forEach(u => {
            const unitQuestions = customData.questions.filter(q => q.unitId === u.id);
            const card = document.createElement('div');
            card.className = 'custom-unit-card';
            card.innerHTML = `
                <div>
                    <div class="unit-info">${u.nameAr} <span style="color:var(--muted); font-weight:500;">(${u.id})</span></div>
                    <div class="unit-count">${unitQuestions.length} سؤال</div>
                </div>
            `;
            const delBtn = document.createElement('button');
            delBtn.className = 'unit-delete-btn';
            delBtn.innerText = 'حذف الوحدة';
            delBtn.onclick = () => deleteCustomUnit(u.id);
            card.appendChild(delBtn);
            list.appendChild(card);

            // عرض الأسئلة الفردية لهذه الوحدة مع زر حذف لكل سؤال
            unitQuestions.forEach((q, idx) => {
                const qRow = document.createElement('div');
                qRow.className = 'custom-question-row';
                const shortText = q.qAr.length > 60 ? q.qAr.slice(0, 60) + '…' : q.qAr;
                qRow.innerHTML = `<span class="custom-question-text">• ${shortText}</span>`;
                const qDelBtn = document.createElement('button');
                qDelBtn.className = 'question-delete-btn';
                qDelBtn.innerText = '✕';
                qDelBtn.title = 'حذف هذا السؤال';
                qDelBtn.onclick = () => deleteCustomQuestion(u.id, q);
                qRow.appendChild(qDelBtn);
                list.appendChild(qRow);
            });
        });
    }

    function addNewUnit() {
        const idInput = document.getElementById('newUnitId');
        const nameArInput = document.getElementById('newUnitNameAr');
        const nameEnInput = document.getElementById('newUnitNameEn');
        const feedback = document.getElementById('unitFeedback');

        const id = idInput.value.trim().replace(/\s+/g, '_');
        const nameAr = nameArInput.value.trim();
        const nameEn = nameEnInput.value.trim();

        if (!id || !nameAr) {
            feedback.className = 'manage-feedback error';
            feedback.innerText = 'الرجاء إدخال معرّف الوحدة واسمها بالعربية على الأقل.';
            return;
        }

        const reservedIds = ['all', 'invitations', 'unit2', 'unit3', 'unit4', 'learning_tips', 'did_you_know', 'vocabulary', 'smash_grab', 'crazy'];
        const exists = customData.units.some(u => u.id === id) || reservedIds.includes(id);
        if (exists) {
            feedback.className = 'manage-feedback error';
            feedback.innerText = 'هذا المعرّف مستخدم بالفعل، اختر معرّفاً آخر.';
            return;
        }

        customData.units.push({ id, nameAr, nameEn });
        saveCustomUnits(customData);

        idInput.value = '';
        nameArInput.value = '';
        nameEnInput.value = '';

        feedback.className = 'manage-feedback success';
        feedback.innerText = `تمت إضافة الوحدة "${nameAr}" بنجاح ✓`;

        renderCustomTabs();
        refreshQuestionUnitSelect();
        renderCustomUnitsList();
    }

    function addNewQuestion() {
        const unitSelect = document.getElementById('questionUnitSelect');
        const qArText = document.getElementById('newQArText');
        const qEnText = document.getElementById('newQEnText');
        const a = document.getElementById('optA');
        const b = document.getElementById('optB');
        const c = document.getElementById('optC');
        const d = document.getElementById('optD');
        const correctSelect = document.getElementById('correctAnswerSelect');
        const feedback = document.getElementById('questionFeedback');

        const unitId = unitSelect.value;
        if (!unitId) {
            feedback.className = 'manage-feedback error';
            feedback.innerText = 'الرجاء إضافة وحدة أولاً ثم اختيارها.';
            return;
        }
        if (!qArText.value.trim() || !a.value.trim() || !b.value.trim() || !c.value.trim() || !d.value.trim()) {
            feedback.className = 'manage-feedback error';
            feedback.innerText = 'الرجاء تعبئة نص السؤال وكل الخيارات الأربعة.';
            return;
        }

        customData.questions.push({
            unitId: unitId,
            qAr: qArText.value.trim(),
            qEn: qEnText.value.trim(),
            options: { A: a.value.trim(), B: b.value.trim(), C: c.value.trim(), D: d.value.trim() },
            correct: correctSelect.value
        });
        saveCustomUnits(customData);

        qArText.value = '';
        qEnText.value = '';
        a.value = ''; b.value = ''; c.value = ''; d.value = '';

        feedback.className = 'manage-feedback success';
        feedback.innerText = 'تمت إضافة السؤال بنجاح ✓';

        rebuildQuizData();
        renderCustomUnitsList();
    }

    function deleteCustomQuestion(unitId, questionObj) {
        if (!confirm('حذف هذا السؤال نهائياً؟')) return;
        customData.questions = customData.questions.filter(q => q !== questionObj);
        saveCustomUnits(customData);
        rebuildQuizData();
        renderCustomUnitsList();
        if (currentFilter === unitId || currentFilter === 'all') {
            initQuiz();
        }
    }

    function deleteCustomUnit(unitId) {
        if (!confirm('سيتم حذف هذه الوحدة وجميع أسئلتها نهائياً. هل أنت متأكد؟')) return;
        customData.units = customData.units.filter(u => u.id !== unitId);
        customData.questions = customData.questions.filter(q => q.unitId !== unitId);
        saveCustomUnits(customData);

        delete quizData.ar.headers[unitId];
        delete quizData.en.headers[unitId];

        renderCustomTabs();
        refreshQuestionUnitSelect();
        renderCustomUnitsList();
        rebuildQuizData();

        if (currentFilter === unitId) {
            filterUnit('all');
        }
    }

    function deleteAllCustomData() {
        if (!confirm('سيتم حذف جميع الوحدات والأسئلة المضافة بشكل نهائي ولا يمكن التراجع عن ذلك. هل تريد الاستمرار؟')) return;
        customData.units.forEach(u => {
            delete quizData.ar.headers[u.id];
            delete quizData.en.headers[u.id];
        });
        customData.units = [];
        customData.questions = [];
        saveCustomUnits(customData);

        renderCustomTabs();
        refreshQuestionUnitSelect();
        renderCustomUnitsList();
        rebuildQuizData();

        const stillExists = customData.units.some(u => u.id === currentFilter);
        if (!stillExists && !['all','invitations','unit2','unit3','unit4','learning_tips','did_you_know'].includes(currentFilter)) {
            filterUnit('all');
        } else {
            initQuiz();
        }
    }

    function resetAllHiddenUnits() {
        if (customData.hiddenBuiltinUnits.length === 0) {
            alert('لا توجد وحدات أساسية مخفية حالياً.');
            return;
        }
        customData.hiddenBuiltinUnits = [];
        saveCustomUnits(customData);
        rebuildQuizData();
        applyBuiltinTabsVisibility();
        renderBuiltinUnitsList();
        initQuiz();
    }

    // ===== حماية لوحة الإدارة بكلمة مرور =====
    function openManagePanel() {
        if (isManageUnlocked) {
            openManagePanelContent();
        } else {
            document.getElementById('managePasswordInput').value = '';
            document.getElementById('passwordFeedback').innerText = '';
            document.getElementById('passwordOverlay').classList.add('open');
            setTimeout(() => document.getElementById('managePasswordInput').focus(), 50);
        }
    }

    function checkManagePassword() {
        const input = document.getElementById('managePasswordInput');
        const feedback = document.getElementById('passwordFeedback');
        if (input.value === MANAGE_PASSWORD) {
            isManageUnlocked = true;
            document.getElementById('passwordOverlay').classList.remove('open');
            openManagePanelContent();
        } else {
            feedback.innerText = 'كلمة المرور غير صحيحة، حاول مرة أخرى.';
            input.value = '';
            input.focus();
        }
    }

    function closePasswordOnOverlay(event) {
        if (event.target.id === 'passwordOverlay') {
            document.getElementById('passwordOverlay').classList.remove('open');
        }
    }

    function openManagePanelContent() {
        document.getElementById('manageOverlay').classList.add('open');
        refreshQuestionUnitSelect();
        renderCustomUnitsList();
        renderBuiltinUnitsList();
    }

    function closeManagePanel() {
        document.getElementById('manageOverlay').classList.remove('open');
    }

    function closeManagePanelOnOverlay(event) {
        if (event.target.id === 'manageOverlay') closeManagePanel();
    }

    function switchManageTab(tab) {
        const tabs = { unit: 'manageContentUnit', question: 'manageContentQuestion', list: 'manageContentList' };
        Object.values(tabs).forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById(tabs[tab]).style.display = 'block';

        ['manageTabUnit', 'manageTabQuestion', 'manageTabList'].forEach(id => document.getElementById(id).classList.remove('active'));
        const activeMap = { unit: 'manageTabUnit', question: 'manageTabQuestion', list: 'manageTabList' };
        document.getElementById(activeMap[tab]).classList.add('active');

        if (tab === 'question') refreshQuestionUnitSelect();
        if (tab === 'list') { renderCustomUnitsList(); renderBuiltinUnitsList(); }
    }


    function updateTabsText() {
        const txt = quizData[currentLang].tabsText;
        document.getElementById('tab-all').innerText = currentLang === 'ar' ? `${txt.all} (All)` : `${txt.all}`;
        document.getElementById('tab-inv').innerText = currentLang === 'ar' ? `${txt.inv} (Invitations)` : `${txt.inv}`;
        document.getElementById('tab-u2').innerText = currentLang === 'ar' ? `${txt.u2} (Unit 2)` : `${txt.u2}`;
        document.getElementById('tab-u3').innerText = currentLang === 'ar' ? `${txt.u3} (Unit 3)` : `${txt.u3}`;
        document.getElementById('tab-u4').innerText = currentLang === 'ar' ? `${txt.u4} (Unit 4)` : `${txt.u4}`;
        document.getElementById('tab-lt').innerText = currentLang === 'ar' ? `${txt.lt} (Learning Tips)` : `${txt.lt}`;
        document.getElementById('tab-dyk').innerText = currentLang === 'ar' ? `${txt.dyk} (Did You Know)` : `${txt.dyk}`;
        document.getElementById('tab-vocab').innerText = currentLang === 'ar' ? `${txt.vocab} (Vocabulary)` : `${txt.vocab}`;
        document.getElementById('tab-sg').innerText = txt.sg;
        document.getElementById('tab-crazy').innerText = txt.crazy;
    }

    function initQuiz() {
        const data = quizData[currentLang];
        
        document.getElementById('quizTitle').innerText = data.title;
        document.getElementById('unitHeader').innerText = data.headers[currentFilter];
        document.getElementById('restartBtn').innerText = data.restartText;
        
        updateTabsText();

        // تصفية الأسئلة بناء على التبويب المختار
        filteredQuestions = data.questions.filter(item => currentFilter === 'all' || item.cat === currentFilter);
        
        currentQuestionIndex = 0;
        userScore = 0;

        document.getElementById('result-card').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('progressContainer').style.display = 'block';

        if(filteredQuestions.length === 0) {
            document.getElementById('questionText').innerText = "No Questions available.";
            document.getElementById('optionsContainer').innerHTML = "";
            return;
        }

        showQuestion();
    }

    function showQuestion() {
        // تحديث شريط التقدم
        const progressPercent = (currentQuestionIndex / filteredQuestions.length) * 100;
        document.getElementById('progressBar').style.width = `${progressPercent}%`;

        // تحديث عداد السؤال (مثال: 3 / 17)
        const counterEl = document.getElementById('questionCounter');
        if (counterEl) {
            counterEl.innerText = `${currentQuestionIndex + 1} / ${filteredQuestions.length}`;
        }

        const currentQuestion = filteredQuestions[currentQuestionIndex];
        document.getElementById('questionText').innerText = currentQuestion.q;
        
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';

        for (let key in currentQuestion.options) {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${key}:</strong> &nbsp;${currentQuestion.options[key]}`;
            btn.onclick = () => checkAnswer(key, btn);
            container.appendChild(btn);
        }
    }

    function checkAnswer(selectedKey, clickedButton) {
        const currentQuestion = filteredQuestions[currentQuestionIndex];
        const correctAnswer = currentQuestion.correct;
        const allButtons = document.querySelectorAll('.option-btn');

        // قفل جميع الأزرار لمنع الضغط المتكرر
        allButtons.forEach(btn => btn.disabled = true);

        if (selectedKey === correctAnswer) {
            clickedButton.classList.add('correct');
            userScore++;
            playCorrectSound();
        } else {
            clickedButton.classList.add('wrong');
            playWrongSound();
            // إظهار الإجابة الصحيحة للمستخدم ليتعلم منها
            allButtons.forEach(btn => {
                if (btn.innerText.startsWith(correctAnswer + ':')) {
                    btn.classList.add('correct');
                }
            });
        }

        // الانتقال التلقائي للسؤال التالي بعد ثانية ونصف
        setTimeout(() => {
            currentQuestionIndex++;
            if (currentQuestionIndex < filteredQuestions.length) {
                showQuestion();
            } else {
                showFinalResult();
            }
        }, 1500);
    }

    function showFinalResult() {
        document.getElementById('progressBar').style.width = `100%`;
        document.getElementById('quiz-box').style.display = 'none';
        
        const resultCard = document.getElementById('result-card');
        const resultMsg = document.getElementById('resultMsg');
        const scoreText = document.getElementById('scoreText');
        const data = quizData[currentLang];
        
        resultCard.style.display = 'block';
        const percentage = (userScore / filteredQuestions.length) * 100;
        const emojiEl = document.getElementById('resultEmoji');

        if (percentage >= 50) {
            resultCard.className = 'success-result';
            resultMsg.innerHTML = data.successMsg;
            if (emojiEl) emojiEl.innerText = '🎉';
            playSuccessFanfare();
        } else {
            resultCard.className = 'fail-result';
            resultMsg.innerHTML = data.failMsg;
            if (emojiEl) emojiEl.innerText = '📋';
            playFailSound();
        }
        
        scoreText.innerHTML = `${data.scoreWord}: <br><span style="font-size: 28px; color: var(--primary-color);">${userScore}</span> ${data.ofWord} ${filteredQuestions.length} (${percentage.toFixed(0)}%)`;
    }

    function restartQuiz() {
        initQuiz();
    }

    function switchLanguage(lang) {
        currentLang = lang;
        const htmlTag = document.getElementById('htmlTag');
        const btnAr = document.getElementById('btn-lang-ar');
        const btnEn = document.getElementById('btn-lang-en');
        const brandEl = document.getElementById('brandText');
        
        if (lang === 'ar') {
            htmlTag.setAttribute('dir', 'rtl');
            htmlTag.setAttribute('lang', 'ar');
            btnAr.classList.add('active');
            btnEn.classList.remove('active');
            if (brandEl) brandEl.innerText = 'الاختبارات';
            updateManageTexts('ar');
        } else {
            htmlTag.setAttribute('dir', 'ltr');
            htmlTag.setAttribute('lang', 'en');
            btnEn.classList.add('active');
            btnAr.classList.remove('active');
            if (brandEl) brandEl.innerText = 'Quiz';
            updateManageTexts('en');
        }
        initQuiz();
        renderCustomTabs();
    }

    function updateManageTexts(lang) {
        const map = {
            ar: {
                manageBtnText: 'إدارة الوحدات والأسئلة',
                managePanelTitle: 'إدارة الوحدات والأسئلة',
                manageTabUnit: 'إضافة وحدة جديدة',
                manageTabQuestion: 'إضافة سؤال',
                manageTabList: 'الوحدات المضافة'
            },
            en: {
                manageBtnText: 'Manage Units & Questions',
                managePanelTitle: 'Manage Units & Questions',
                manageTabUnit: 'Add New Unit',
                manageTabQuestion: 'Add Question',
                manageTabList: 'Custom Units'
            }
        };
        const t = map[lang];
        Object.keys(t).forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerText = t[id];
        });
    }

    function filterUnit(category) {
        currentFilter = category;
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(tab => tab.classList.remove('active'));

        const tabMap = { all: 'all', invitations: 'inv', unit2: 'u2', unit3: 'u3', unit4: 'u4', learning_tips: 'lt', did_you_know: 'dyk', vocabulary: 'vocab', smash_grab: 'sg', crazy: 'crazy' };
        if (tabMap[category]) {
            document.getElementById(`tab-${tabMap[category]}`).classList.add('active');
        } else {
            const customBtn = document.getElementById(`tab-custom-${category}`);
            if (customBtn) customBtn.classList.add('active');
        }
        initQuiz();
    }

    // تشغيل الاختبار فور تحميل الصفحة لأول مرة
    window.onload = function() {
        mergeCustomDataIntoQuiz();
        renderCustomTabs();
        initQuiz();
    };
</script>
